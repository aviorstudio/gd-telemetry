name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release, e.g. 0.0.1'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release tag
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Version must look like 0.0.1 or 0.0.1-rc.1." >&2
            exit 1
          fi
          tag_name="v${version}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag_name}" >/dev/null 2>&1; then
            echo "Tag ${tag_name} already exists." >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$tag_name" "$GITHUB_SHA"
          git push origin "$tag_name"
          echo "TAG_NAME=$tag_name" >> "$GITHUB_ENV"

      - name: Package addon
        run: |
          set -euo pipefail
          test -f addon/plugin.cfg
          repo_owner="${GITHUB_REPOSITORY%%/*}"
          repo_name="${GITHUB_REPOSITORY#*/}"
          tag_name="${TAG_NAME}"
          addon_dir="@${repo_owner}_${repo_name}"
          package_root="dist/addons/${addon_dir}"
          mkdir -p "$package_root"
          cp addon/plugin.cfg addon/plugin.gd "$package_root/"
          cp addon/*.uid "$package_root/" 2>/dev/null || true
          if [ -f addon/autoload.gd ]; then cp addon/autoload.gd "$package_root/"; fi
          if [ -d addon/src ]; then cp -R addon/src "$package_root/"; fi
          (cd dist && zip -r "${repo_name}-${tag_name}.zip" addons)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          generate_release_notes: true
          files: dist/*.zip
